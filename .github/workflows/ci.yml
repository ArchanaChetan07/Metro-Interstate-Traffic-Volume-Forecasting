name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-fast.txt flake8

      - name: Lint with flake8 (package + tests + scripts)
        run: |
          flake8 metro_traffic scripts tests \
            --max-line-length=120 \
            --ignore=E501,W503,E203

      - name: Run pytest
        env:
          PYTHONPATH: .
        run: pytest tests/ -v --tb=short

      - name: Fast benchmark (LR + GBR + ADF)
        env:
          PYTHONPATH: .
        run: python scripts/run_benchmark.py --out artifacts/ci_benchmark.json
